services:
  postgres:
    container_name: prisma-postgres-dev
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${PG_PRISMA_DB}
      POSTGRES_USER: ${PG_PRISMA_USER}
      POSTGRES_PASSWORD: ${PG_PRISMA_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata-prisma:/var/lib/postgresql/data
  postgres:
    container_name: drizzle-postgres-dev
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${PG_DRIZZLE_DB}
      POSTGRES_USER: ${PG_DRIZZLE_USER}
      POSTGRES_PASSWORD: ${PG_DRIZZLE_PASSWORD}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - pgdata-drizzle:/var/lib/postgresql/data

volumes:
  pgdata-prisma:
  pgdata-drizzle:
