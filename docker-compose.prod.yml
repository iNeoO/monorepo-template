services:
  nest-backend:
    container_name: nest-backend-prod
    build:
      dockerfile: ./packages/nest-backend/Dockerfile.prod
    ports:
      - "4010:3000"

  hono-backend:
    container_name: hono-backend-prod
    build:
      dockerfile: ./packages/hono-backend/Dockerfile.prod
    ports:
      - "4011:3000"

  next-frontend:
    container_name: next-frontend-prod
    build:
      dockerfile: ./packages/next-frontend/Dockerfile.prod
    ports:
      - "4000:3000"

  nuxt-frontend:
    container_name: nuxt-frontend-prod
    build:
      dockerfile: ./packages/nuxt-frontend/Dockerfile.prod
    ports:
      - "4001:3000"
