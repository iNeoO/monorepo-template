services:
  postgres:
    container_name: monorepo-template-postgres-dev
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${PG_DB}
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  jaeger:
    container_name: monorepo-template-jaeger-dev
    image: jaegertracing/jaeger:latest
    ports:
      - "127.0.0.1:16686:16686"
      - "127.0.0.1:4318:4318"

volumes:
  pgdata:
